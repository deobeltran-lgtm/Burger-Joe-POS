<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Burger Joe POS</title>
    <style>
        :root {
            --primary: #FFD700;
            --danger: #ff4444;
            --success: #00C851;
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        h1 { margin: 10px 0; font-size: 1.5rem; color: var(--primary); letter-spacing: 1px; }
        
        .display-container { background: var(--card); width: 100%; max-width: 500px; padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; border: 1px solid #333; box-sizing: border-box; }
        .total-amount { font-size: 3.5rem; font-weight: 800; color: var(--primary); margin: 5px 0; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 500px; margin-bottom: 20px; }
        .menu-btn { background: var(--card); border: 2px solid #333; color: white; padding: 15px 5px; border-radius: 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .menu-btn:active { transform: scale(0.95); background: #333; }
        .item-name { font-weight: bold; font-size: 0.9rem; text-align: center; height: 35px; display: flex; align-items: center; }
        .item-price { color: var(--primary); font-size: 1.1rem; margin-top: 5px;}

        /* QTY Summary Table */
        .summary-card { background: var(--card); width: 100%; max-width: 500px; border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid #333; box-sizing: border-box;}
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { text-align: left; color: #888; border-bottom: 1px solid #333; padding-bottom: 8px; }
        td { padding: 8px 0; border-bottom: 1px solid #2a2a2a; }
        .qty-col { text-align: center; font-weight: bold; color: var(--primary); }
        .amt-col { text-align: right; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 500px; margin-bottom: 50px;}
        .ctrl-btn { padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .undo { background: #333; color: var(--text); border: 1px solid #555; }
        .export { background: var(--success); color: white; }
        .reset { background: var(--danger); color: white; grid-column: span 2; margin-top: 10px; opacity: 0.6; font-size: 0.7rem; }
    </style>
</head>
<body>

    <h1>BURGER JOE</h1>

    <div class="display-container">
        <div style="color:#888; font-size: 0.8rem; text-transform: uppercase;">Total Sales Today</div>
        <div class="total-amount">₱<span id="totalDisplay">0</span></div>
    </div>

    <div class="menu-grid">
        <button class="menu-btn" onclick="addSale('Mighty Joe', 250)">
            <span class="item-name">Mighty Joe</span><span class="item-price">₱250</span>
        </button>
        <button class="menu-btn" onclick="addSale('Sloppy Joe', 150)">
            <span class="item-name">Sloppy Joe</span><span class="item-price">₱150</span>
        </button>
        <button class="menu-btn" onclick="addSale('Joe Burger', 140)">
            <span class="item-name">Joe Burger</span><span class="item-price">₱140</span>
        </button>
        <button class="menu-btn" onclick="addSale('Burger Steak 1p', 140)">
            <span class="item-name">Burger Steak 1p</span><span class="item-price">₱140</span>
        </button>
        <button class="menu-btn" onclick="addSale('Burger Steak 2p', 180)">
            <span class="item-name">Burger Steak 2p</span><span class="item-price">₱180</span>
        </button>
        <button> class="menu-btn" onclick="addSale('Mineral Water', 25)">
            <span class="item-name">Mineral Water</span><span class="item-price">₱25</span>
        </button>
        <button class="menu-btn" onclick="addSale('Sliders 2', 110)">
            <span class="item-name">Sliders 2</span><span class="item-price">₱110</span>
        </button>
        <button class="menu-btn" onclick="addSale('Sliders 5', 250)">
            <span class="item-name">Sliders 5</span><span class="item-price">₱250</span>
        </button>
    </div>

    <div class="summary-card">
        <h3 style="margin-top:0; font-size: 1rem; border-bottom: 1px solid #333; padding-bottom: 10px;">Itemized Summary</h3>
        <table>
            <thead>
                <tr>
                    <th>Item</th>
                    <th style="text-align:center">QTY</th>
                    <th style="text-align:right">Subtotal</th>
                </tr>
            </thead>
            <tbody id="summaryBody">
                </tbody>
        </table>
    </div>

    <div class="controls">
        <button class="ctrl-btn undo" onclick="undo()">⟲ Undo</button>
        <button class="ctrl-btn export" onclick="exportToExcel()">📊 Export</button>
        <button class="ctrl-btn reset" onclick="resetSales()">Reset Day</button>
    </div>

    <script>
        let sales = JSON.parse(localStorage.getItem('burgerJoeSales')) || [];
        const menuPrices = {
            'Mighty Joe': 250, 'Sloppy Joe': 150, 'Joe Burger': 140,
            'Burger Steak 1p': 140, 'Burger Steak 2p': 180,
            'Sliders 2': 110, 'Sliders 5': 250
        };

        function updateUI() {
            const total = sales.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('totalDisplay').innerText = total.toLocaleString();
            
            // Calculate QTYs
            const summary = {};
            Object.keys(menuPrices).forEach(name => summary[name] = { qty: 0, subtotal: 0 });
            
            sales.forEach(s => {
                if (summary[s.item]) {
                    summary[s.item].qty++;
                    summary[s.item].subtotal += s.price;
                }
            });

            // Update Table
            let html = "";
            for (const [name, data] of Object.entries(summary)) {
                if (data.qty > 0) {
                    html += `<tr>
                        <td>${name}</td>
                        <td class="qty-col">${data.qty}</td>
                        <td class="amt-col">₱${data.subtotal.toLocaleString()}</td>
                    </tr>`;
                }
            }
            document.getElementById('summaryBody').innerHTML = html || "<tr><td colspan='3' style='text-align:center; color:#555; padding:20px;'>No sales yet</td></tr>";
            
            localStorage.setItem('burgerJoeSales', JSON.stringify(sales));
        }

        function addSale(name, price) {
            sales.push({ item: name, price: price, time: new Date().toLocaleTimeString(), date: new Date().toLocaleDateString() });
            updateUI();
            if (window.navigator.vibrate) window.navigator.vibrate(40);
        }

        function undo() {
            if (sales.length > 0 && confirm(`Undo last sale (${sales[sales.length-1].item})?`)) {
                sales.pop();
                updateUI();
            }
        }

        function resetSales() {
            if (confirm("Reset everything to zero? Make sure you exported first!")) {
                sales = [];
                updateUI();
            }
        }

        function exportToExcel() {
            if (sales.length === 0) return alert("Nothing to export!");
            let csv = "\uFEFFDate,Time,Item,Price\n";
            sales.forEach(s => csv += `${s.date},${s.time},${s.item},${s.price}\n`);
            
            // Append QTY summary to CSV
            csv += "\nSUMMARY\nItem,QTY,Subtotal\n";
            const summary = {};
            sales.forEach(s => {
                summary[s.item] = (summary[s.item] || 0) + 1;
            });
            for (const item in summary) {
                csv += `${item},${summary[item]},${summary[item] * menuPrices[item]}\n`;
            }
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `BurgerJoe_Report_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }

        updateUI();
    </script>
</body>
</html>
